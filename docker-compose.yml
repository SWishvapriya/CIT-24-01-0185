version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mydb

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  web:
    build: ./app
    container_name: flask-web
    restart: always

    ports:
      - "5000:5000"

    depends_on:
      - mysql

volumes:
  mysql-data:
